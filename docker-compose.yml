services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pool
      POSTGRES_DB: pool
    ports:
      - "5435:5432"
    volumes:
      - pool_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d pool"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pool_pg_data:
