services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pool
      POSTGRES_DB: pool
    volumes:
      - pool_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d pool"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://admin:pool@postgres:5432/pool
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  seat-sync:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["npm", "run", "seat-sync"]
    environment:
      NODE_ENV: production
      SEAT_SYNC_PORT: "3331"
      SEAT_SYNC_SECRET: ${SEAT_SYNC_SECRET:?set SEAT_SYNC_SECRET}
      SEAT_DRAFT_TTL_MS: ${SEAT_DRAFT_TTL_MS:-300000}
    ports:
      - "3331:3331"

volumes:
  pool_pg_data:
